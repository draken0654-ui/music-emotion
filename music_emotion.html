<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵 Emotion Music Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1DB954 0%, #191414 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: clamp(1.2em, 4vw, 2em);
            font-weight: 700;
            color: #1DB954;
            margin-bottom: 3px;
        }

        .header .subtitle {
            color: #b3b3b3;
            font-size: clamp(0.7em, 2vw, 0.9em);
            font-weight: 300;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px;
        }

        .controls-section {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .playlist-controls {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .playlist-dropdown {
            flex: 1;
            min-width: 150px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #1DB954;
            color: #fff;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85em;
            cursor: pointer;
        }

        .playlist-dropdown option {
            background: #191414;
            color: #fff;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(29, 185, 84, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #1DB954;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            color: #fff;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #1DB954;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: #1DB954;
            color: #000;
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .add-to-playlist-btn {
            padding: 4px 8px;
            background: rgba(29, 185, 84, 0.2);
            border: 1px solid #1DB954;
            border-radius: 6px;
            color: #1DB954;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: auto;
            flex-shrink: 0;
        }

        .add-to-playlist-btn:hover {
            background: rgba(29, 185, 84, 0.3);
        }

        .playlist-song-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .remove-btn {
            padding: 4px 8px;
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 6px;
            color: #ff4444;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .playlist-empty {
            text-align: center;
            padding: 20px;
            color: #b3b3b3;
            font-size: 0.85em;
        }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1DB954;
            color: #000;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn.active {
            background: #1DB954;
            color: #000;
        }

        .btn.stop {
            background: #ff4444;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            min-height: 400px;
        }

        .panel-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1DB954;
        }

        #videoContainer {
            position: relative;
            width: 84%;
            max-width: 420px;
            margin: 0 auto 12px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        .search-container {
            margin: 12px 0;
        }

        .search-box {
            display: flex;
            gap: 6px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            color: #fff;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1DB954;
            background: rgba(255, 255, 255, 0.15);
        }

        .search-box input::placeholder {
            color: #b3b3b3;
        }

        .search-btn {
            padding: 10px 20px;
            background: #1DB954;
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }

        .search-btn:active {
            transform: scale(0.95);
        }

        #status {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            text-align: center;
            margin: 10px 0;
            font-size: 0.85em;
            color: #b3b3b3;
        }

        .emotion-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            color: #000;
            border-radius: 50px;
            font-weight: 600;
            margin: 8px 0;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4);
            font-size: 0.85em;
        }

        #currentPlayer {
            margin-bottom: 15px;
            display: none;
        }

        #currentCover {
            width: 100%;
            max-width: 200px;
            height: auto;
            aspect-ratio: 1;
            border-radius: 10px;
            margin: 0 auto 12px;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        #currentTrack {
            margin: 10px 0;
            text-align: center;
        }

        .track-title {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .track-artist {
            color: #b3b3b3;
            font-size: 0.8em;
            line-height: 1.3;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
            height: 40px;
        }

        .playlist {
            max-height: 350px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px;
        }

        .playlist::-webkit-scrollbar {
            width: 5px;
        }

        .playlist::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: #1DB954;
            border-radius: 10px;
        }

        .song-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song-item:active {
            transform: scale(0.98);
        }

        .song-item.playing {
            background: rgba(29, 185, 84, 0.2);
            border-left: 3px solid #1DB954;
        }

        .song-thumb {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .song-details {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .song-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            font-size: 0.85em;
            line-height: 1.3;
        }

        .song-artist {
            font-size: 0.75em;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #1DB954;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 8px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 30px 15px;
            color: #b3b3b3;
        }

        .empty-state svg {
            width: 50px;
            height: 50px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.85em;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .main-container {
                padding: 20px;
            }

            .content-grid {
                grid-template-columns: 1fr 1.3fr;
                gap: 20px;
            }

            .panel {
                padding: 20px;
            }

            .panel-title {
                font-size: 1.3em;
            }

            #videoContainer {
                width: 100%;
                max-width: 560px;
            }

            #currentCover {
                max-width: 250px;
            }

            .playlist {
                max-height: 450px;
            }

            .song-thumb {
                width: 55px;
                height: 55px;
            }

            .song-item {
                padding: 12px;
                gap: 12px;
            }

            .song-title {
                font-size: 0.95em;
            }

            .song-artist {
                font-size: 0.8em;
            }

            .btn {
                padding: 11px 22px;
                font-size: 0.9em;
            }

            audio {
                height: 45px;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 1.1em;
            }

            .header .subtitle {
                font-size: 0.65em;
            }

            .btn {
                padding: 8px 14px;
                font-size: 0.75em;
            }

            .song-thumb {
                width: 40px;
                height: 40px;
            }

            #currentCover {
                max-width: 180px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎵 Emotion Music Player</h1>
        <div class="subtitle">AI-Powered Music Recommendation | By FlyerCoal</div>
    </div>

    <div class="main-container">
        <div class="controls-section">
            <button class="btn" id="startBtn" onclick="toggleDetection()">▶ Start Detection</button>
            <button class="btn secondary active" id="hindiBtn" onclick="setLanguage('hindi')">🇮🇳 Hindi</button>
            <button class="btn secondary" id="englishBtn" onclick="setLanguage('english')">🇺🇸 English</button>
        </div>

        <div class="content-grid">
            <div class="panel">
                <div class="panel-title">📹 Emotion Detection</div>

                <div id="videoContainer">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>

                <div id="status">Click "Start Detection" to begin</div>
                <div id="emotionDisplay"></div>

                <div class="search-container">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search for any song...">
                        <button class="search-btn" onclick="manualSearch()">🔍</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">🎧 Now Playing</div>

                <div class="playlist-controls">
                    <select class="playlist-dropdown" id="playlistSelector" onchange="switchPlaylist()">
                        <option value="search">🔍 Search Results</option>
                    </select>
                    <button class="btn icon-btn" onclick="openCreatePlaylistModal()" title="Create Playlist">➕</button>
                    <button class="btn icon-btn" onclick="deleteCurrentPlaylist()" title="Delete Playlist">🗑️</button>
                </div>

                <div id="currentPlayer">
                    <img id="currentCover" src="" alt="">
                    <div id="currentTrack"></div>
                    <audio id="audioPlayer" controls autoplay preload="auto"></audio>
                </div>

                <div class="playlist" id="playlist">
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                        </svg>
                        <p>Start emotion detection or search for songs</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Playlist Modal -->
    <div class="modal" id="createPlaylistModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Create New Playlist</div>
                <button class="close-btn" onclick="closeCreatePlaylistModal()">×</button>
            </div>
            <input type="text" class="modal-input" id="playlistNameInput" placeholder="Enter playlist name...">
            <div class="modal-actions">
                <button class="modal-btn secondary" onclick="closeCreatePlaylistModal()">Cancel</button>
                <button class="modal-btn primary" onclick="createPlaylist()">Create</button>
            </div>
        </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div class="modal" id="addToPlaylistModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Add to Playlist</div>
                <button class="close-btn" onclick="closeAddToPlaylistModal()">×</button>
            </div>
            <div id="playlistSelectionList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const emotionDisplay = document.getElementById('emotionDisplay');
        const playlist = document.getElementById('playlist');
        const currentCover = document.getElementById('currentCover');
        const currentTrack = document.getElementById('currentTrack');
        const audioPlayer = document.getElementById('audioPlayer');
        const startBtn = document.getElementById('startBtn');
        const hindiBtn = document.getElementById('hindiBtn');
        const englishBtn = document.getElementById('englishBtn');
        const videoContainer = document.getElementById('videoContainer');
        const currentPlayer = document.getElementById('currentPlayer');
        const searchInput = document.getElementById('searchInput');

        let lastEmotion = '';
        let modelsLoaded = false;
        let selectedLanguage = 'hindi';
        // Smoothing: average emotion scores across last N frames
        const SMOOTH_FRAMES = 5;
        let emotionBuffer = [];
        let currentPlaylist = [];
        let currentSongIndex = 0;
        let playedSongs = [];
        let detectionActive = false;
        let detectionInterval = null;
        let stream = null;

        // Playlist management
        let userPlaylists = {};
        let currentPlaylistView = 'search';
        let searchResultsCache = [];
        let selectedSongForAdd = null;

        // Load playlists from localStorage on startup
        function loadPlaylists() {
            try {
                const stored = localStorage.getItem('userPlaylists');
                if (stored) {
                    userPlaylists = JSON.parse(stored);
                    console.log('Playlists loaded:', userPlaylists);
                    updatePlaylistDropdown();
                } else {
                    console.log('No saved playlists found');
                }
            } catch (e) {
                console.error('Failed to load playlists:', e);
            }
        }

        // Save playlists to localStorage
        function savePlaylists() {
            try {
                localStorage.setItem('userPlaylists', JSON.stringify(userPlaylists));
                console.log('Playlists saved successfully:', userPlaylists);
            } catch (e) {
                console.error('Failed to save playlists:', e);
            }
        }

        // Update playlist dropdown
        function updatePlaylistDropdown() {
            const selector = document.getElementById('playlistSelector');
            selector.innerHTML = '<option value="search">🔍 Search Results</option>';

            Object.keys(userPlaylists).forEach(playlistId => {
                const playlist = userPlaylists[playlistId];
                const option = document.createElement('option');
                option.value = playlistId;
                option.textContent = `🎵 ${playlist.name}`;
                selector.appendChild(option);
            });

            selector.value = currentPlaylistView;
        }

        // Create playlist modal
        function openCreatePlaylistModal() {
            document.getElementById('createPlaylistModal').classList.add('active');
            document.getElementById('playlistNameInput').value = '';
            document.getElementById('playlistNameInput').focus();
        }

        function closeCreatePlaylistModal() {
            document.getElementById('createPlaylistModal').classList.remove('active');
        }

        // Create new playlist
        function createPlaylist() {
            const nameInput = document.getElementById('playlistNameInput');
            const name = nameInput.value.trim();

            if (!name) {
                alert('Please enter a playlist name');
                return;
            }

            const playlistId = 'playlist_' + Date.now();
            userPlaylists[playlistId] = {
                name: name,
                songs: [],
                createdAt: new Date().toISOString()
            };

            savePlaylists();
            updatePlaylistDropdown();
            closeCreatePlaylistModal();

            status.innerHTML = `✅ Playlist "${name}" created!`;

            // Switch to new playlist
            currentPlaylistView = playlistId;
            document.getElementById('playlistSelector').value = playlistId;
            switchPlaylist();
        }

        // Delete current playlist
        function deleteCurrentPlaylist() {
            if (currentPlaylistView === 'search') {
                alert('Cannot delete search results');
                return;
            }

            const playlist = userPlaylists[currentPlaylistView];
            if (!playlist) return;

            if (confirm(`Delete playlist "${playlist.name}"?`)) {
                delete userPlaylists[currentPlaylistView];
                savePlaylists();
                currentPlaylistView = 'search';
                updatePlaylistDropdown();
                switchPlaylist();
                status.innerHTML = `✅ Playlist deleted`;
            }
        }

        // Switch between playlists
        function switchPlaylist() {
            const selector = document.getElementById('playlistSelector');
            currentPlaylistView = selector.value;

            if (currentPlaylistView === 'search') {
                currentPlaylist = searchResultsCache;
            } else {
                const playlist = userPlaylists[currentPlaylistView];
                if (playlist) {
                    currentPlaylist = playlist.songs;
                }
            }

            currentSongIndex = 0;
            playedSongs = [];
            displayPlaylist();

            if (currentPlaylist.length > 0) {
                playCurrentSong();
            } else {
                currentPlayer.style.display = 'none';
                audioPlayer.pause();
            }
        }

        // Open add to playlist modal
        function openAddToPlaylistModal(song) {
            selectedSongForAdd = song;
            const modal = document.getElementById('addToPlaylistModal');
            const listContainer = document.getElementById('playlistSelectionList');

            listContainer.innerHTML = '';

            const playlistKeys = Object.keys(userPlaylists);

            if (playlistKeys.length === 0) {
                listContainer.innerHTML = '<div class="playlist-empty">No playlists yet. Create one first!</div>';
            } else {
                playlistKeys.forEach(playlistId => {
                    const playlist = userPlaylists[playlistId];
                    const item = document.createElement('div');
                    item.className = 'song-item';
                    item.innerHTML = `
                        <div class="song-details">
                            <div class="song-title">🎵 ${playlist.name}</div>
                            <div class="song-artist">${playlist.songs.length} songs</div>
                        </div>
                    `;
                    item.onclick = () => addSongToPlaylist(playlistId, song);
                    listContainer.appendChild(item);
                });
            }

            modal.classList.add('active');
        }

        function closeAddToPlaylistModal() {
            document.getElementById('addToPlaylistModal').classList.remove('active');
            selectedSongForAdd = null;
        }

        // Add song to playlist
        function addSongToPlaylist(playlistId, song) {
            const playlist = userPlaylists[playlistId];
            if (!playlist) return;

            // Check if song already exists
            const exists = playlist.songs.some(s => s.id === song.id);
            if (exists) {

            playlist.songs.push(song);

            if (currentPlaylistView === playlistId) {
                switchPlaylist();
            }
        }

        function setLanguage(lang) {
            selectedLanguage = lang;
            hindiBtn.classList.remove('active');
            englishBtn.classList.remove('active');

            if (lang === 'hindi') {
                hindiBtn.classList.add('active');
            } else {
                englishBtn.classList.add('active');
            }

            status.innerHTML = `✅ Language: ${lang.toUpperCase()}`;
        }

        async function toggleDetection() {
            if (!detectionActive) {
                startBtn.textContent = '⏸ Stop Detection';
                startBtn.classList.add('stop');
                detectionActive = true;

                if (!modelsLoaded) {
                    await loadModels();
                }
                startVideo();
            } else {
                startBtn.textContent = '▶ Start Detection';
                startBtn.classList.remove('stop');
                detectionActive = false;
                stopVideo();
                status.innerHTML = 'Detection stopped. Click START to resume.';
                emotionDisplay.innerHTML = '';
            }
        }

        async function loadModels() {
            try {
                status.innerHTML = '<div class="loader"></div>Loading AI models...';

                const MODEL_URL = '/models';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

                modelsLoaded = true;
                status.innerHTML = '✅ Models loaded successfully!';
            } catch (error) {
                console.error('Model load error:', error);
                // Fallback to CDN if local fails
                try {
                    status.innerHTML = '<div class="loader"></div>Local models failed, trying CDN...';
                    const CDN_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
                    await faceapi.nets.tinyFaceDetector.loadFromUri(CDN_URL);
                    await faceapi.nets.faceExpressionNet.loadFromUri(CDN_URL);
                    modelsLoaded = true;
                    status.innerHTML = '✅ Models loaded (CDN)!';
                } catch (cdnError) {
                    console.error('CDN model load error:', cdnError);
                    status.innerHTML = '❌ Failed to load models. Check /var/www/html/models/ on your VPS or internet connection.';
                    detectionActive = false;
                    startBtn.textContent = '▶ Start Detection';
                    startBtn.classList.remove('stop');
                }
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: 'user'
                }
            })
                .then(s => {
                    stream = s;
                    video.srcObject = stream;
                    videoContainer.style.display = 'block';
                    status.innerHTML = '📹 Camera active. Show your face...';

                    video.onloadedmetadata = () => {
                        video.play();
                        setTimeout(startDetection, 500);
                    };
                })
                .catch(() => {
                    status.innerHTML = '⚠️ Camera access denied. Please allow camera permission.';
                    detectionActive = false;
                    startBtn.textContent = '▶ Start Detection';
                    startBtn.classList.remove('stop');
                });
        }

        function stopVideo() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            emotionBuffer = [];
            videoContainer.style.display = 'none';
            if (detectionInterval) {
                clearInterval(detectionInterval);
            }
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function startDetection() {
            const checkVideo = setInterval(() => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    clearInterval(checkVideo);
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    runDetection();
                }
            }, 100);
        }

        function runDetection() {
            emotionBuffer = []; // reset buffer on each new detection session

            detectionInterval = setInterval(async () => {
                if (!detectionActive) return;

                const detections = await faceapi
                    .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({
                        inputSize: 416,
                        scoreThreshold: 0.25   // lower = easier face detection in any lighting
                    }))
                    .withFaceExpressions();

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (detections.length === 0) {
                    status.innerHTML = '👤 No face detected. Move closer or improve lighting.';
                    emotionBuffer = [];
                    return;
                }

                const resized = faceapi.resizeResults(detections, {
                    width: video.videoWidth,
                    height: video.videoHeight
                });

                // --- Draw face box ---
                const box = resized[0].detection.box;
                ctx.strokeStyle = '#1DB954';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#1DB954';
                ctx.strokeRect(box.x, box.y, box.width, box.height);
                ctx.shadowBlur = 0;

                // --- Smoothing: push this frame into buffer ---
                const rawExpressions = resized[0].expressions;
                emotionBuffer.push(rawExpressions);
                if (emotionBuffer.length > SMOOTH_FRAMES) emotionBuffer.shift();

                // Average scores across buffered frames
                const emotionKeys = Object.keys(rawExpressions);
                const smoothed = {};
                emotionKeys.forEach(key => {
                    smoothed[key] = emotionBuffer.reduce((sum, frame) => sum + (frame[key] || 0), 0) / emotionBuffer.length;
                });

                const sortedEmotions = Object.entries(smoothed).sort((a, b) => b[1] - a[1]);
                const emotion = sortedEmotions[0][0];
                const confidence = (sortedEmotions[0][1] * 100).toFixed(0);

                // --- Draw label on canvas ---
                const labelText = `${emotion.toUpperCase()}  ${confidence}%`;
                ctx.font = 'bold 15px sans-serif';
                const textW = ctx.measureText(labelText).width + 10;
                const labelY = box.y > 26 ? box.y - 22 : box.y + box.height + 4;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(box.x, labelY, textW, 20);
                ctx.fillStyle = '#1DB954';
                ctx.fillText(labelText, box.x + 5, labelY + 14);

                // --- Status + emotion bars ---
                status.innerHTML = `✅ Face detected — analyzing emotions`;

                const emojiMap = { happy:'😄', sad:'😢', angry:'😠', disgusted:'🤢', fearful:'😨', surprised:'😲', neutral:'😐' };
                const barsHtml = sortedEmotions.map(([name, score]) => {
                    const pct = (score * 100).toFixed(1);
                    const isTop = name === emotion;
                    return `
                        <div style="display:flex;align-items:center;gap:6px;margin:3px 0;">
                            <span style="width:22px;text-align:center;">${emojiMap[name] || '🎭'}</span>
                            <span style="width:80px;font-size:0.75em;color:${isTop ? '#1DB954' : '#b3b3b3'};font-weight:${isTop ? '700' : '400'}">${name}</span>
                            <div style="flex:1;background:rgba(255,255,255,0.1);border-radius:50px;height:8px;overflow:hidden;">
                                <div style="width:${pct}%;height:100%;background:${isTop ? '#1DB954' : 'rgba(255,255,255,0.3)'};border-radius:50px;transition:width 0.3s;"></div>
                            </div>
                            <span style="width:38px;text-align:right;font-size:0.75em;color:${isTop ? '#1DB954' : '#b3b3b3'}">${pct}%</span>
                        </div>`;
                }).join('');

                emotionDisplay.innerHTML = `
                    <div class="emotion-badge" style="margin-bottom:10px;">${emojiMap[emotion] || ''} ${emotion.toUpperCase()} — ${confidence}%</div>
                    <div style="padding:8px 4px;">${barsHtml}</div>
                `;

                // Trigger mood song only when smoothed confidence is high enough — detection keeps running
                if (emotionBuffer.length >= 3 && emotion !== lastEmotion && sortedEmotions[0][1] > 0.65) {
                    lastEmotion = emotion;
                    playedSongs = [];
                    playEmotionSong(emotion);
                }

            }, 300);
        }

        function playEmotionSong(emotion) {
            const track = emotionAutoTracks[emotion] || emotionAutoTracks.neutral;
            currentPlaylist = [track];
            searchResultsCache = [track];
            currentPlaylistView = 'search';
            document.getElementById('playlistSelector').value = 'search';
            currentSongIndex = 0;
            displayPlaylist();
            playCurrentSong();
            status.innerHTML = `🎧 Playing mood song for ${emotion.toUpperCase()}`;
        }

        async function manualSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                status.innerHTML = '⚠️ Please enter a song name.';
                return;
            }
            fetchAndPlaySong(query);
        }

        async function fetchAndPlaySong(query) {
            status.innerHTML = '<div class="loader"></div>Searching for songs...';

            try {
                // Use JioSaavn API endpoint
                const saavnUrl = `https://jiosaavn-api-privatecvc2.vercel.app/search/songs?query=${encodeURIComponent(query)}&page=1&limit=25`;
                const response = await fetch(saavnUrl);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API Response:', data);

                // Extract songs from the response
                let songs = [];
                if (data.success && data.data && data.data.results) {
                    songs = data.data.results;
                } else if (data.data && Array.isArray(data.data.results)) {
                    songs = data.data.results;
                } else if (data.data && Array.isArray(data.data)) {
                    songs = data.data;
                } else if (Array.isArray(data.results)) {
                    songs = data.results;
                } else if (Array.isArray(data.songs)) {
                    songs = data.songs;
                }

                console.log('Parsed songs:', songs);

                if (songs.length > 0) {
                    songs = songs.sort(() => Math.random() - 0.5);
                    currentPlaylist = songs.map(song => {
                        const downloadUrl = song.downloadUrl || song.more_info?.encrypted_media_url || song.media_url || song.url || song.preview_url || [];
                        let previewUrl = '';

                        if (Array.isArray(downloadUrl)) {
                            previewUrl = downloadUrl.find(item => item?.link || item?.url)?.link ||
                                downloadUrl.find(item => item?.link || item?.url)?.url || '';
                        } else if (typeof downloadUrl === 'object' && downloadUrl !== null) {
                            previewUrl = downloadUrl.link || downloadUrl.url || '';
                        } else if (typeof downloadUrl === 'string') {
                            previewUrl = downloadUrl;
                        }

                        if (!previewUrl && song.media_url) {
                            previewUrl = song.media_url;
                        }
                        if (!previewUrl && song.url) {
                            previewUrl = song.url;
                        }
                        if (!previewUrl && song.preview_url) {
                            previewUrl = song.preview_url;
                        }

                        const artists = song.primaryArtists || song.artists?.primary || song.more_info?.artistMap?.primary_artists || [];
                        const artistNames = Array.isArray(artists)
                            ? artists.map(a => a.name || a).join(', ')
                            : (song.subtitle || song.artist || 'Unknown Artist');

                        const images = song.image || song.images || song.album?.cover_medium || song.album?.cover_big || [];
                        let smallImage = '';
                        let bigImage = '';

                        if (Array.isArray(images)) {
                            smallImage = images[0]?.link || images[0]?.url || images[0] || '';
                            bigImage = images[2]?.link || images[2]?.url || images[1]?.link ||
                                images[1]?.url || images[0]?.link || images[0]?.url || smallImage;
                        } else if (typeof images === 'object' && images !== null) {
                            smallImage = images.link || images.url || images.cover_small || '';
                            bigImage = images.cover_big || images.cover_medium || smallImage;
                        } else if (typeof images === 'string') {
                            smallImage = bigImage = images;
                        }

                        return {
                            id: song.id || song.sid || song.song_id || Math.random().toString(),
                            title: song.title || song.name || song.song || 'Unknown',
                            artist: { name: artistNames },
                            album: {
                                cover_small: smallImage,
                                cover_big: bigImage || smallImage
                            },
                            preview: previewUrl || song.media_url || song.url || song.preview_url || ''
                        };
                    }).filter(track => track.preview);

                    if (currentPlaylist.length > 0) {
                        searchResultsCache = [...currentPlaylist];
                        currentPlaylistView = 'search';
                        document.getElementById('playlistSelector').value = 'search';
                        currentSongIndex = 0;
                        displayPlaylist();
                        playCurrentSong();
                        status.innerHTML = `✅ Found ${currentPlaylist.length} songs!`;
                        return;
                    } else {
                        status.innerHTML = '❌ Found songs but no playable URLs available.';
                        return;
                    }
                }
            } catch (error) {
                console.error('Full Error:', error);
                status.innerHTML = `❌ Failed to fetch. Check your internet connection.`;
                return;
            }

            status.innerHTML = '❌ No songs found. Try different keywords.';
        }

        function displayPlaylist() {
            playlist.innerHTML = '';

            if (currentPlaylist.length === 0) {
                playlist.innerHTML = `
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
                        </svg>
                        <p>${currentPlaylistView === 'search' ? 'Start emotion detection or search for songs' : 'This playlist is empty. Add songs from search results!'}</p>
                    </div>
                `;
                return;
            }

            currentPlaylist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'song-item' + (index === currentSongIndex ? ' playing' : '');

                const isSearchView = currentPlaylistView === 'search';
                const isUserPlaylist = currentPlaylistView !== 'search';

                item.innerHTML = `
                    <img src="${track.album.cover_small}" class="song-thumb" alt="">
                    <div class="song-details">
                        <div class="song-title">${track.title}</div>
                        <div class="song-artist">${track.artist.name}</div>
                    </div>
                    ${isSearchView ? `<button class="add-to-playlist-btn" onclick="event.stopPropagation(); openAddToPlaylistModal(currentPlaylist[${index}])">+ Add</button>` : ''}
                    ${isUserPlaylist ? `<button class="remove-btn" onclick="event.stopPropagation(); removeSongFromPlaylist('${currentPlaylistView}', '${track.id}')">Remove</button>` : ''}
                `;

                item.onclick = () => {
                    currentSongIndex = index;
                    playCurrentSong();
                };
                playlist.appendChild(item);
            });
        }

        function playCurrentSong() {
            if (!currentPlaylist[currentSongIndex]) return;

            const track = currentPlaylist[currentSongIndex];
            const audioSource = track.preview || track.media_url || track.url || track.preview_url || '';

            if (!audioSource) {
                status.innerHTML = '❌ Unable to play this track; no valid audio source found.';
                return;
            }

            if (!playedSongs.includes(track.id)) {
                playedSongs.push(track.id);
            }

            currentCover.src = track.album?.cover_big || track.album?.cover_small || track.cover || track.image || '';
            currentTrack.innerHTML = `
                <div class="track-title">${track.title}</div>
                <div class="track-artist">${track.artist?.name || 'Unknown Artist'}</div>
            `;
            audioPlayer.src = audioSource;
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error('Audio play failed:', error, track);
                status.innerHTML = '⚠️ Playback blocked or invalid audio source. Try another song.';
            });

            currentPlayer.style.display = 'block';
            displayPlaylist();
        }

        audioPlayer.addEventListener('ended', () => {
            const availableSongs = currentPlaylist.filter(s => !playedSongs.includes(s.id));

            if (availableSongs.length === 0) {
                playedSongs = [];
                currentSongIndex = Math.floor(Math.random() * currentPlaylist.length);
            } else {
                const randomSong = availableSongs[Math.floor(Math.random() * availableSongs.length)];
                currentSongIndex = currentPlaylist.findIndex(s => s.id === randomSong.id);
            }

            playCurrentSong();
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') manualSearch();
        });

        document.getElementById('playlistNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createPlaylist();
        });

        // Load playlists when page loads
        window.addEventListener('DOMContentLoaded', () => {
            loadPlaylists();
        });

        // Also try loading immediately
        loadPlaylists();
    </script>
